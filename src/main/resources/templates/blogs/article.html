<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事</title>
</head>
<body>
    <h1>記事</h1>
    <div>
        <p th:each="blog : ${blogs}">

            <p th:text="${blog.text}"></p>
    </p>
</div>

</body>
</html>
